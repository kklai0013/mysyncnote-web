<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#121513">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <title>MySyncNote</title>
  <style>
    :root{color-scheme:dark;--bg:#0d0f0e;--side:#121513;--panel:#181c19;--line:#303731;--text:#edf2ee;--muted:#96a199;--green:#9be3b8;--green2:#193b27;--red:#ff9d9d}*{box-sizing:border-box}html,body{height:100%}body{margin:0;background:var(--bg);color:var(--text);font:15px/1.55 system-ui,"Segoe UI",sans-serif}button,input,textarea{font:inherit}button{color:inherit}.app{height:100%;display:grid;grid-template-columns:280px 1fr}.sidebar{min-width:0;display:flex;flex-direction:column;border-right:1px solid var(--line);background:var(--side)}.brand{padding:18px;border-bottom:1px solid var(--line)}.brand h1{margin:0;font-size:1.25rem}.brand p{margin:3px 0 0;color:var(--muted);font-size:.78rem}.storage{margin:12px;padding:12px;border:1px solid var(--line);border-radius:12px;background:#0e110f}.storage-head{display:flex;justify-content:space-between;gap:8px;align-items:center}.storage b{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.badge{flex:none;padding:2px 7px;border-radius:999px;background:var(--green2);color:var(--green);font-size:.68rem;font-weight:800}.storage p{margin:7px 0;color:var(--muted);font-size:.78rem}.buttons{display:flex;gap:7px;flex-wrap:wrap}button{min-height:38px;padding:0 12px;border:1px solid #3b453e;border-radius:9px;background:#252b27;cursor:pointer;font-weight:700}button.primary{border-color:transparent;background:var(--green);color:#092014}button:disabled{opacity:.38;cursor:not-allowed}.new{margin:0 12px 10px}.search{margin:0 12px 10px;width:calc(100% - 24px);height:38px;padding:0 11px;border:1px solid var(--line);border-radius:9px;background:#0c0f0d;color:var(--text);outline:none}.files{min-height:0;overflow:auto;padding:0 8px 16px}.file{display:flex;align-items:center;gap:9px;width:100%;margin:2px 0;padding:8px 10px;border:0;background:transparent;text-align:left;font-weight:500}.file:hover,.file.active{background:#242a26}.file.active{color:var(--green)}.file span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.editor{min-width:0;display:flex;flex-direction:column}.toolbar{min-height:60px;padding:10px 16px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--line);background:#101311}.title{min-width:0;flex:1;border:0;background:transparent;color:var(--text);font-size:1.12rem;font-weight:750;outline:none}.save-state{color:var(--muted);font-size:.78rem}.workspace{min-height:0;flex:1;display:grid;grid-template-columns:1fr}.workspace.previewing{grid-template-columns:1fr 1fr}.write,.preview{min-width:0;height:100%;overflow:auto}.write textarea{display:block;width:100%;height:100%;resize:none;padding:34px max(28px,8vw);border:0;outline:none;background:var(--bg);color:var(--text);font:16px/1.8 ui-monospace,"Cascadia Code",monospace}.preview{display:none;padding:34px max(28px,5vw);border-left:1px solid var(--line);background:#111412}.previewing .preview{display:block}.preview h1,.preview h2,.preview h3{line-height:1.25}.preview code{padding:2px 5px;border-radius:5px;background:#242a26;color:#c9f1d8}.preview pre{overflow:auto;padding:14px;border-radius:10px;background:#090b0a}.preview blockquote{margin-left:0;padding-left:14px;border-left:3px solid var(--green);color:var(--muted)}.empty{display:grid;place-items:center;height:100%;padding:25px;text-align:center;color:var(--muted)}.mobile-head{display:none}.notice{position:fixed;right:18px;bottom:18px;max-width:min(420px,calc(100% - 36px));padding:12px 15px;border:1px solid var(--line);border-radius:11px;background:#222824;box-shadow:0 15px 40px #0008}.notice.error{border-color:#744;color:#ffd3d3}.hidden{display:none!important}.dialog{position:fixed;inset:0;display:grid;place-items:center;padding:18px;background:#000a}.dialog-card{width:min(520px,100%);padding:20px;border:1px solid var(--line);border-radius:16px;background:var(--panel);box-shadow:0 24px 70px #000}.dialog-card h2{margin-top:0}.dialog-card p{color:var(--muted)}.dialog-card code{color:var(--green)}
    @media(max-width:760px){.app{display:block}.sidebar{position:fixed;z-index:5;inset:0 54px 0 0;transform:translateX(-110%);transition:.18s;box-shadow:18px 0 50px #0009}.sidebar.open{transform:none}.mobile-head{display:inline-flex}.toolbar{padding:8px}.workspace.previewing{grid-template-columns:1fr}.previewing .write{display:none}.write textarea,.preview{padding:22px 18px}.save-state{display:none}}
  </style>
</head>
<body>
<div class="app">
  <aside id="sidebar" class="sidebar">
    <div class="brand"><h1>MySyncNote</h1><p>Markdown 筆記</p></div>
    <section class="storage">
      <div class="storage-head"><b id="folderName">示範模式</b><span id="modeBadge" class="badge">記憶體</span></div>
      <p id="storageHelp">先試用編輯器；選取資料夾後才會讀寫真實 .md 檔案。</p>
      <div class="buttons"><button id="openFolder">電腦資料夾</button><button id="driveInfo" class="primary">登入 Google Drive</button></div>
    </section>
    <button id="newNote" class="new primary">＋ 新增筆記</button>
    <input id="search" class="search" placeholder="搜尋檔名">
    <nav id="files" class="files"></nav>
  </aside>

  <main class="editor">
    <header class="toolbar">
      <button id="menu" class="mobile-head">☰</button>
      <input id="title" class="title" value="歡迎使用 MySyncNote" aria-label="筆記名稱">
      <span id="saveState" class="save-state">示範筆記</span>
      <button id="rename">F2 改名</button>
      <button id="previewButton">預覽</button>
      <button id="save" class="primary">儲存</button>
    </header>
    <section id="workspace" class="workspace">
      <div class="write"><textarea id="content" spellcheck="false"></textarea></div>
      <article id="preview" class="preview"></article>
    </section>
  </main>
</div>

<div id="notice" class="notice hidden"></div>

<script>
  const $=id=>document.getElementById(id);
  const GOOGLE_CLIENT_ID='519723474566-rtp19jh0982g2b4m7ipk1nat4ldli5s9.apps.googleusercontent.com';
  const GOOGLE_API_KEY='AIzaSyAkoJMyob5FaWeXNN2N2YxcgWl13-000PY';
  const GOOGLE_PROJECT_NUMBER='519723474566';
  const DRIVE_SCOPE='https://www.googleapis.com/auth/drive';
  const FOLDER_MIME='application/vnd.google-apps.folder';
  const demo={name:'歡迎使用 MySyncNote.md',content:'# 歡迎使用 MySyncNote\n\n這是一篇可以直接修改的 Markdown 筆記。\n\n## Google Drive 使用方式\n\n1. 網站放到 GitHub Pages 後，用手機或電腦開啟。\n2. 按左側「登入 Google Drive」。\n3. 在 Google 官方視窗選擇帳號並授權。\n4. 選擇一個 Google Drive 資料夾。\n5. 左側會載入該資料夾內的 `.md`。\n\n- 按 `Ctrl+S` 儲存\n- 按 `F2` 重新命名\n- 按「預覽」查看 Markdown\n'};
  let storageMode='demo',directory=null,driveToken=null,driveFolder=null,notes=[{...demo,handle:null,driveId:null}],current=notes[0],dirty=false,previewing=false,googleLibraries=null;

  const escape=s=>s.replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  function markdown(source){let s=escape(source);s=s.replace(/^```([\s\S]*?)```$/gm,'<pre><code>$1</code></pre>').replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>').replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>').replace(/^[-*] (.+)$/gm,'<li>$1</li>').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');return '<p>'+s+'</p>'}
  function notify(text,error=false){$('notice').textContent=text;$('notice').className='notice'+(error?' error':'');clearTimeout(notify.timer);notify.timer=setTimeout(()=>$('notice').classList.add('hidden'),3500)}
  function cleanName(name){name=name.trim().replace(/[\\/:*?"<>|]/g,'-');if(!name.toLowerCase().endsWith('.md'))name+='.md';return name||'未命名.md'}
  function renderList(){const q=$('search').value.toLowerCase();$('files').innerHTML='';notes.filter(n=>n.name.toLowerCase().includes(q)).forEach(n=>{const b=document.createElement('button');b.className='file'+(n===current?' active':'');b.innerHTML='<span>▤</span><span></span>';b.lastChild.textContent=n.name;b.onclick=()=>select(n);$('files').append(b)})}
  async function select(note){if(current&&dirty)await save();if(storageMode==='drive'&&note.content===null){$('saveState').textContent='載入中…';note.content=await readDriveFile(note.driveId)}current=note;$('title').value=note.name.replace(/\.md$/i,'');$('content').value=note.content;dirty=false;updateState();renderList();renderPreview();$('sidebar').classList.remove('open')}
  function updateState(){if(!current)return;$('saveState').textContent=storageMode==='demo'?'示範模式':(dirty?'尚未儲存':'已儲存');$('rename').disabled=storageMode==='demo'||(storageMode==='local'&&!current.handle)}
  function renderPreview(){$('preview').innerHTML=markdown($('content').value)}
  function loadScript(src){return new Promise((resolve,reject)=>{const old=document.querySelector(`script[src="${src}"]`);if(old){if(old.dataset.loaded)resolve();else old.addEventListener('load',resolve,{once:true});return}const s=document.createElement('script');s.src=src;s.async=true;s.onload=()=>{s.dataset.loaded='1';resolve()};s.onerror=()=>reject(Error(`無法載入 ${src}`));document.head.append(s)})}
  async function loadGoogleLibraries(){if(googleLibraries)return googleLibraries;googleLibraries=(async()=>{await Promise.all([loadScript('https://accounts.google.com/gsi/client'),loadScript('https://apis.google.com/js/api.js')]);await new Promise((resolve,reject)=>gapi.load('picker',{callback:resolve,onerror:()=>reject(Error('Google Picker 載入失敗'))}))})();return googleLibraries}
  async function driveFetch(url,options={}){if(!driveToken)throw Error('請重新登入 Google Drive');const headers=new Headers(options.headers||{});headers.set('Authorization',`Bearer ${driveToken}`);const response=await fetch(url,{...options,headers});if(response.status===401){driveToken=null;$('driveInfo').textContent='重新登入 Google Drive';throw Error('Google 授權已過期，請重新登入')}if(!response.ok){let detail='';try{detail=(await response.json()).error?.message||''}catch{}throw Error(detail||`Google Drive 錯誤 ${response.status}`)}return response}
  async function connectDrive(){if(location.protocol==='file:'){notify('Google 登入不能在本機檔案執行；請用 GitHub Pages 的 HTTPS 網址開啟',true);return}try{$('driveInfo').disabled=true;$('driveInfo').textContent='連接中…';await loadGoogleLibraries();driveToken=await new Promise((resolve,reject)=>{const client=google.accounts.oauth2.initTokenClient({client_id:GOOGLE_CLIENT_ID,scope:DRIVE_SCOPE,callback:response=>response.error?reject(Error(response.error)):resolve(response.access_token)});client.requestAccessToken({prompt:''})});await chooseDriveFolder()}catch(e){notify(e.message||String(e),true)}finally{$('driveInfo').disabled=false;$('driveInfo').textContent=driveFolder?'更換 Drive 資料夾':'登入 Google Drive'}}
  function chooseDriveFolder(){return new Promise((resolve,reject)=>{const view=new google.picker.DocsView(google.picker.ViewId.FOLDERS).setIncludeFolders(true).setSelectFolderEnabled(true).setMimeTypes(FOLDER_MIME).setMode(google.picker.DocsViewMode.LIST);const picker=new google.picker.PickerBuilder().addView(view).setOAuthToken(driveToken).setDeveloperKey(GOOGLE_API_KEY).setAppId(GOOGLE_PROJECT_NUMBER).setOrigin(location.origin).setTitle('選擇 MySyncNote 筆記資料夾').setCallback(async data=>{if(data.action===google.picker.Action.PICKED){try{const folder=data.docs[0];driveFolder={id:folder.id,name:folder.name};await loadDriveNotes();resolve()}catch(e){reject(e)}}else if(data.action===google.picker.Action.CANCEL)resolve()}).build();picker.setVisible(true)})}
  async function loadDriveNotes(){storageMode='drive';directory=null;notes=[];let pageToken='';do{const params=new URLSearchParams({q:`'${driveFolder.id}' in parents and trashed = false`,fields:'nextPageToken,files(id,name,mimeType,modifiedTime)',pageSize:'1000',orderBy:'folder,name'});if(pageToken)params.set('pageToken',pageToken);const data=await (await driveFetch(`https://www.googleapis.com/drive/v3/files?${params}`)).json();notes.push(...data.files.filter(file=>file.mimeType!==FOLDER_MIME&&file.name.toLowerCase().endsWith('.md')).map(file=>({name:file.name,content:null,handle:null,driveId:file.id})));pageToken=data.nextPageToken||''}while(pageToken);$('folderName').textContent=driveFolder.name;$('modeBadge').textContent='Google Drive';$('storageHelp').textContent='編輯內容會直接儲存到這個雲端資料夾。';$('driveInfo').textContent='更換 Drive 資料夾';if(notes.length)await select(notes[0]);else await createNote();renderList();notify(`已連接 Google Drive：${driveFolder.name}`)}
  async function readDriveFile(id){const response=await driveFetch(`https://www.googleapis.com/drive/v3/files/${encodeURIComponent(id)}?alt=media`);return response.text()}
  async function createDriveFile(note){const boundary='mysyncnote_'+Date.now();const metadata=JSON.stringify({name:note.name,mimeType:'text/markdown',parents:[driveFolder.id]});const body=`--${boundary}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${metadata}\r\n--${boundary}\r\nContent-Type: text/markdown; charset=UTF-8\r\n\r\n${note.content}\r\n--${boundary}--`;const response=await driveFetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name',{method:'POST',headers:{'Content-Type':`multipart/related; boundary=${boundary}`},body});const data=await response.json();note.driveId=data.id;note.name=data.name}
  async function saveDriveNote(note){if(!note.driveId)return createDriveFile(note);await driveFetch(`https://www.googleapis.com/upload/drive/v3/files/${encodeURIComponent(note.driveId)}?uploadType=media`,{method:'PATCH',headers:{'Content-Type':'text/markdown; charset=UTF-8'},body:note.content})}
  async function openFolder(){if(!window.showDirectoryPicker){notify(`此環境沒有 showDirectoryPicker（安全環境：${isSecureContext?'是':'否'}）`,true);return}try{directory=await showDirectoryPicker({mode:'readwrite'});storageMode='local';driveFolder=null;notes=[];for await(const entry of directory.values()){if(entry.kind==='file'&&entry.name.toLowerCase().endsWith('.md')){const file=await entry.getFile();notes.push({name:entry.name,content:await file.text(),handle:entry,driveId:null})}}notes.sort((a,b)=>a.name.localeCompare(b.name,'zh-Hant'));$('folderName').textContent=directory.name;$('modeBadge').textContent='電腦資料夾';$('storageHelp').textContent='所有儲存都直接寫回這個資料夾。';if(notes.length)await select(notes[0]);else await createNote();renderList();notify(`已開啟 ${directory.name}`)}catch(e){if(e.name!=='AbortError')notify(`${e.name}: ${e.message}`,true)}}
  async function createNote(){if(current&&dirty)await save();let base='未命名筆記',i=1,name=base+'.md';while(notes.some(n=>n.name===name))name=`${base} ${++i}.md`;let handle=null;if(storageMode==='local')handle=await directory.getFileHandle(name,{create:true});const note={name,content:'# 未命名筆記\n\n開始寫作…\n',handle,driveId:null};notes.unshift(note);await select(note);dirty=true;updateState();$('title').focus();$('title').select()}
  async function save(){if(!current)return;current.content=$('content').value;if(storageMode==='demo'){dirty=false;updateState();notify('示範模式不會永久儲存；請登入 Google Drive 或開啟電腦資料夾');return}try{if(storageMode==='drive')await saveDriveNote(current);else{if(!current.handle)current.handle=await directory.getFileHandle(current.name,{create:true});const out=await current.handle.createWritable();await out.write(current.content);await out.close()}dirty=false;updateState();renderList();notify(`已儲存 ${current.name}`)}catch(e){notify(e.message||`${e.name}: ${e.message}`,true)}}
  async function rename(){if(storageMode==='demo'||!current)return;const next=cleanName($('title').value);if(next===current.name)return;try{current.content=$('content').value;if(storageMode==='drive'){if(!current.driveId){current.name=next;await saveDriveNote(current)}else{await saveDriveNote(current);await driveFetch(`https://www.googleapis.com/drive/v3/files/${encodeURIComponent(current.driveId)}`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:next})});current.name=next}}else{const newHandle=await directory.getFileHandle(next,{create:true});const out=await newHandle.createWritable();await out.write(current.content);await out.close();await directory.removeEntry(current.name);current.name=next;current.handle=newHandle}dirty=false;renderList();updateState();notify(`已改名為 ${next}`)}catch(e){notify(e.message||`${e.name}: ${e.message}`,true)}}

  $('openFolder').onclick=openFolder;$('newNote').onclick=createNote;$('save').onclick=save;$('rename').onclick=rename;$('search').oninput=renderList;
  $('content').oninput=()=>{dirty=true;current.content=$('content').value;updateState();if(previewing)renderPreview()};
  $('title').oninput=()=>{dirty=true;updateState()};$('title').onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();rename()}};
  $('previewButton').onclick=()=>{previewing=!previewing;$('workspace').classList.toggle('previewing',previewing);$('previewButton').textContent=previewing?'編輯':'預覽';renderPreview()};
  $('menu').onclick=()=>$('sidebar').classList.toggle('open');$('driveInfo').onclick=connectDrive;
  addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='s'){e.preventDefault();save()}if(e.key==='F2'){e.preventDefault();$('title').focus();$('title').select()}});
  addEventListener('beforeunload',e=>{if(dirty){e.preventDefault();e.returnValue=''}});
  $('content').value=current.content;renderList();renderPreview();updateState();
  if('serviceWorker' in navigator && location.protocol.startsWith('http')) navigator.serviceWorker.register('./sw.js').catch(()=>{});
</script>
</body>
</html>
